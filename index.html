<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speech Accuracy Coach</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 40px; background-color: #f8f9fa; }
        .container { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); width: 100%; max-width: 600px; text-align: center; }
        .step-label { color: #adb5bd; font-weight: 700; text-transform: uppercase; font-size: 12px; margin-bottom: 10px; }
        
        .sentence-display { font-size: 32px; line-height: 1.5; margin: 20px 0; font-weight: 600; color: #333; }
        .word { display: inline-block; margin: 0 4px; padding: 0 2px; transition: all 0.2s; }
        
        /* Clear Final States */
        .correct { color: #2ecc71; border-bottom: 3px solid #2ecc71; }
        .wrong { color: #e74c3c; border-bottom: 3px solid #e74c3c; }

        .status-pill { display: inline-block; padding: 10px 25px; border-radius: 50px; font-size: 14px; background: #eee; margin: 20px 0; transition: 0.3s; }
        .listening { background: #ff4757; color: white; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .score-display { font-size: 48px; font-weight: 800; color: #228be6; margin: 10px 0; display: none; }
        .controls { margin-top: 20px; }
        button { background: #212529; color: white; border: none; padding: 12px 30px; border-radius: 10px; cursor: pointer; font-size: 16px; display: none; margin: 10px auto; }
        
        kbd { background: #eee; border: 1px solid #ccc; border-radius: 4px; padding: 2px 6px; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <div id="stepLabel" class="step-label">Loading...</div>
    <div id="textContainer" class="sentence-display"></div>
    
    <div id="status" class="status-pill">Press Space to Record</div>
    <div id="score" class="score-display">0%</div>

    <button id="nextBtn" onclick="nextSentence()">Next Sentence →</button>

    <div style="margin-top: 30px; color: #adb5bd; font-size: 13px;">
        <kbd>Space</kbd> Start/Stop &nbsp; | &nbsp; <kbd>L</kbd> Hear Example
    </div>
</div>

<script>
    let sentences = [];
    let currentStep = 0;
    let isListening = false;
    let recognition;

    // Load Speech Engine
    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.continuous = false; // Stop when the user stops talking or hits space
        recognition.interimResults = false; // Only care about the final polished result
        recognition.lang = 'en-US';
    }

    async function loadData() {
        try {
            const resp = await fetch('sentences.json');
            sentences = await resp.json();
            renderSentence();
        } catch (e) { document.getElementById('stepLabel').innerText = "JSON Error"; }
    }

    function renderSentence() {
        const words = sentences[currentStep].split(" ");
        document.getElementById('textContainer').innerHTML = words.map((w, i) => `<span class="word" id="word-${i}">${w}</span>`).join("");
        document.getElementById('stepLabel').innerText = `Sentence ${currentStep + 1} of ${sentences.length}`;
        document.getElementById('score').style.display = "none";
        document.getElementById('nextBtn').style.display = "none";
        document.getElementById('status').innerText = "Press Space to Record";
        document.getElementById('status').className = "status-pill";
    }

    window.addEventListener('keydown', (e) => {
        if (e.code === "Space") {
            e.preventDefault();
            if (!isListening) startRecording();
            else stopRecording();
        }
        if (e.key.toLowerCase() === "l") playExample();
    });

    function startRecording() {
        isListening = true;
        recognition.start();
        document.getElementById('status').innerText = "🔴 RECORDING... (Press Space to Stop)";
        document.getElementById('status').className = "status-pill listening";
    }

    function stopRecording() {
        isListening = false;
        recognition.stop();
        document.getElementById('status').innerText = "Analyzing Pronunciation...";
        document.getElementById('status').className = "status-pill";
    }

    recognition.onresult = (event) => {
        const result = event.results[0][0].transcript.toLowerCase().replace(/[?.!,]/g,"");
        const target = sentences[currentStep].toLowerCase().replace(/[?.!,]/g,"");
        const targetWords = sentences[currentStep].split(" ");
        
        let correctCount = 0;

        targetWords.forEach((word, i) => {
            const cleanWord = word.toLowerCase().replace(/[?.!,]/g,"");
            const element = document.getElementById(`word-${i}`);
            
            // If the transcript contains this specific word
            if (result.includes(cleanWord)) {
                element.className = "word correct";
                correctCount++;
            } else {
                element.className = "word wrong";
            }
        });

        // Show Score
        const finalScore = Math.round((correctCount / targetWords.length) * 100);
        const scoreEl = document.getElementById('score');
        scoreEl.innerText = finalScore + "%";
        scoreEl.style.display = "block";
        document.getElementById('nextBtn').style.display = "block";
        document.getElementById('status').innerText = "Done!";
    };

    function playExample() {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(sentences[currentStep]);
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
    }

    function nextSentence() {
        currentStep = (currentStep + 1) % sentences.length;
        renderSentence();
    }

    loadData();
</script>
</body>
</html>
