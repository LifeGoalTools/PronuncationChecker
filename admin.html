<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - Edit Sentences</title>
    <style>
        body { font-family: sans-serif; padding: 40px; background: #f4f4f4; }
        .box { background: white; padding: 20px; border-radius: 8px; max-width: 600px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 300px; font-family: monospace; margin: 10px 0; padding: 10px; border: 1px solid #ccc; box-sizing: border-box; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #2ea44f; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        #log { margin-top: 10px; font-size: 13px; color: #666; }
    </style>
</head>
<body>

<div class="box">
    <h2>Secret Admin Panel</h2>
    <p>Edit your JSON array below:</p>
    
    <textarea id="jsonEditor">Loading...</textarea>
    
    <input type="password" id="ghToken" placeholder="Paste GitHub Personal Access Token Here">
    <button onclick="saveToGithub()">Save & Deploy to GitHub</button>
    
    <div id="log"></div>
</div>

<script>
    // Configuration - UPDATE THESE
    const OWNER = 'LifeGoalTools';
    const REPO = 'PronuncationChecker';
    const FILE_PATH = 'sentences.json';
    
    let currentSha = ''; // GitHub needs the "SHA" (ID) of the file to update it

    // 1. Load the current data
    async function loadCurrentData() {
        const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`;
        try {
            const resp = await fetch(url);
            const data = await resp.json();
            currentSha = data.sha;
            // Decode base64 content from GitHub
            const content = atob(data.content);
            document.getElementById('jsonEditor').value = content;
        } catch (e) {
            document.getElementById('log').innerText = "Error loading file. Check OWNER and REPO names.";
        }
    }

    // 2. Save the data
    async function saveToGithub() {
        const token = document.getElementById('ghToken').value;
        const newContent = document.getElementById('jsonEditor').value;
        const log = document.getElementById('log');

        if (!token) return alert("Please enter your GitHub token!");

        log.innerText = "Saving...";

        const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`;
        
        const body = {
            message: "Update sentences via Admin Panel",
            content: btoa(unescape(encodeURIComponent(newContent))), // Correctly encode to Base64
            sha: currentSha
        };

        try {
            const resp = await fetch(url, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(body)
            });

            if (resp.ok) {
                const result = await resp.json();
                currentSha = result.content.sha; // Update SHA for next save
                log.innerText = "✅ Success! Wait 1 minute for changes to go live.";
            } else {
                const errorData = await resp.json();
                log.innerText = "❌ Error: " + errorData.message;
            }
        } catch (e) {
            log.innerText = "❌ Connection failed.";
        }
    }

    loadCurrentData();
</script>

</body>
</html>
